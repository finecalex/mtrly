<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 4px;
        font-weight: 600;
      }
      .sub {
        color: #8a8a8a;
        font-size: 11px;
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px solid #222;
      }
      .row:last-child { border-bottom: none; }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 9px;
        background: #7cff7c;
        color: #0a0a0a;
        border: none;
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: #f5f5f5;
        border: 1px solid #222;
      }
      button.ghost {
        background: transparent;
        color: #7cff7c;
        border: 1px solid #1a3a1a;
      }
      .muted { color: #8a8a8a; }
      .accent { color: #7cff7c; }
      .section-title {
        margin-top: 14px;
        margin-bottom: 6px;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
        color: #8a8a8a;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .addr-link {
        color: #7cff7c;
        text-decoration: none;
        font-size: 10px;
      }
      .addr-link:hover { text-decoration: underline; }
      .activity {
        background: #121212;
        border: 1px solid #222;
        border-radius: 6px;
        max-height: 220px;
        overflow-y: auto;
        padding: 0 10px;
      }
      .tick {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px solid #1a1a1a;
        font-size: 11px;
      }
      .tick:last-child { border-bottom: none; }
      .tick .title {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #d0d0d0;
        margin: 0 8px;
      }
      .tick .amount { color: #f5f5f5; font-weight: 600; }
      .tick a {
        color: #7cff7c;
        text-decoration: none;
        font-size: 10px;
        margin-left: 6px;
        padding: 2px 5px;
        border: 1px solid #1a3a1a;
        border-radius: 3px;
      }
      .tick a:hover { background: rgba(124,255,124,0.1); }
      .tick .pending { color: #8a8a8a; font-size: 10px; }
      .empty { color: #8a8a8a; font-size: 11px; padding: 10px 0; text-align: center; }
      .totals {
        display: flex;
        gap: 10px;
        margin-top: 6px;
        font-size: 10px;
        color: #8a8a8a;
      }
      .totals span b { color: #f5f5f5; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>mtrly</h1>
    <div class="sub">v0.0.1 · arc testnet</div>
    <div class="row"><span class="muted">Status</span><b id="auth-status">Logged out</b></div>
    <div class="row"><span class="muted">Balance</span><b id="balance">—</b></div>

    <div id="wallet-section" style="display:none">
      <div class="section-title">
        <span>Your Arc wallet</span>
        <a id="wallet-link" class="addr-link" href="#" target="_blank">arcscan ↗</a>
      </div>
      <div class="row">
        <span class="muted">Address</span>
        <b id="wallet-addr" style="font-size:11px">—</b>
      </div>
    </div>

    <div id="activity-section" style="display:none">
      <div class="section-title">
        <span>Recent onchain ticks</span>
        <a id="all-activity-link" class="addr-link" href="#" target="_blank">all ↗</a>
      </div>
      <div id="activity-list" class="activity">
        <div class="empty">Loading…</div>
      </div>
      <div class="totals">
        <span><b id="total-payments">0</b> payments</span>
        <span><b id="total-onchain" class="accent">0</b> onchain</span>
        <span><b id="total-volume">$0</b> spent</span>
      </div>
    </div>

    <button id="login-btn">Log in</button>
    <button class="secondary" id="topup-btn">Top up</button>
    <button class="ghost" id="explorer-btn" style="display:none">View all on Arc Explorer ↗</button>
    <script src="popup.js"></script>
  </body>
</html>
