<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 4px;
        font-weight: 600;
      }
      .sub {
        color: #8a8a8a;
        font-size: 11px;
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #222;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 10px;
        background: #7cff7c;
        color: #0a0a0a;
        border: none;
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: #f5f5f5;
        border: 1px solid #222;
      }
      .muted {
        color: #8a8a8a;
      }
    </style>
  </head>
  <body>
    <h1>mtrly</h1>
    <div class="sub">v0.0.1 · arc testnet</div>
    <div class="row"><span class="muted">Status</span><b id="auth-status">Logged out</b></div>
    <div class="row"><span class="muted">Balance</span><b id="balance">—</b></div>
    <button id="login-btn">Log in</button>
    <button class="secondary" id="topup-btn">Top up →</button>
    <script src="popup.js"></script>
  </body>
</html>
